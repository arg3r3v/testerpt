<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba PT</title>

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.2/dist/aframe-extras.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <script src="https://unpkg.com/aframe-aabb-collider-component@3.2.1/dist/aframe-aabb-collider-component.min.js"></script>
  
</head>

<style>
  /* Zona joystick*/
  #joyLeft, #joyRight {
    position: absolute;
    bottom: 20px;
    width: 160px;
    height: 160px;
    touch-action: none;
    display: none;
    z-index: 9999;
  }

  #joyLeft { left: 20px; }
  #joyRight { right: 20px; }

  html, body {
    height: 100%;
    margin: 0;
  }
</style>

<body style="margin:0; overflow:hidden;">

  <!--Zona para joystick-->
  <div id="joyLeft"></div>
  <div id="joyRight"></div>
  
  <a-scene vr-mode-ui="enabled: true"
    fog="type: exponential; color: #000000; density: 0.15"
    background="color: #B2B2B2"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    shadow="type: pcfsoft">
      
    <video
        id="stormVideo"
        src="assets/0527.mp4"
        autoplay
        muted
        loop
        playsinline>
      </video>

      <video
        id="tvVideo"
        src="assets/noti.mp4"
        autoplay
        muted
        loop
        playsinline>
      </video>
    
    <!-- Assets -->
    <a-assets>
      <a-asset-item id="nino" src="assets/ninopt.glb"></a-asset-item>
      <a-asset-item id="mama" src="assets/mama.glb"></a-asset-item>
      
      <a-asset-item id="mesa" src="assets/mesa.glb"></a-asset-item>
      <a-asset-item id="librero" src="assets/librero.glb"></a-asset-item>
      <a-asset-item id="libros" src="assets/libros.glb"></a-asset-item>
      <a-asset-item id="sillon" src="assets/sillon.glb"></a-asset-item>
      <a-asset-item id="tele" src="assets/tele.glb"></a-asset-item>
      <a-asset-item id="cuadros" src="assets/cuadros.glb"></a-asset-item>
      <a-asset-item id="velasyplatos" src="assets/velasyplatos.glb"></a-asset-item>
      <a-asset-item id="salon" src="assets/salon.glb"></a-asset-item>
      <a-asset-item id="puertas" src="assets/puertas.glb"></a-asset-item>
      <a-asset-item id="altar" src="assets/altar.glb"></a-asset-item>
      <a-asset-item id="perchero" src="assets/perchero.glb"></a-asset-item>
      <a-asset-item id="plantas" src="assets/plantas.glb"></a-asset-item>
      <a-asset-item id="navmesh" src="assets/navmesh.glb"></a-asset-item>

      <audio id="audio1" src="assets/audio1.mp3" preload="auto"></audio>
      <audio id="audio2" src="assets/audio2.mp3" preload="auto"></audio>
      <audio id="audio3" src="assets/audio3.mp3" preload="auto"></audio>
      <audio id="audio4" src="assets/audio4.mp3" preload="auto"></audio>
      <audio id="audio5" src="assets/audio5.mp3" preload="auto"></audio>
      <audio id="audio6" src="assets/audio6.mp3" preload="auto"></audio>
      <audio id="audio7" src="assets/audio7.mp3" preload="auto"></audio>
      <audio id="audio8" src="assets/audio8.mp3" preload="auto"></audio>
      <audio id="audio9" src="assets/audio9.mp3" preload="auto"></audio>
      <audio id="audio10" src="assets/audio10.mp3" preload="auto"></audio>
      <audio id="audio11" src="assets/audio11.mp3" preload="auto"></audio>
      <audio id="audio12" src="assets/audio12.mp3" preload="auto"></audio>
      <audio id="audio13" src="assets/audio13.mp3" preload="auto"></audio>
      
    </a-assets>

    <a-entity
      id="navmeshEntity"
      gltf-model="#navmesh"
      nav-mesh
      visible="false">
    </a-entity>
    
    <!-- Modelos -->
    <a-entity gltf-model="#mesa" position="0 0 0"></a-entity>
    <a-entity gltf-model="#librero" position="0 0 0"></a-entity>
    <a-entity gltf-model="#libros" position="0 0 0"></a-entity>
    <a-entity gltf-model="#salon" position="0 0 0"></a-entity>
    <a-entity gltf-model="#sillon" position="0 0 0"></a-entity>
    <a-entity gltf-model="#tele" position="0 0 0"></a-entity>
    <a-entity gltf-model="#cuadros" position="0 0 0"></a-entity>
    <a-entity gltf-model="#velasyplatos" position="0 0 0"></a-entity>
    <a-entity gltf-model="#puertas" position="0 0 0"></a-entity>
    <a-entity gltf-model="#altar" position="0 0 0"></a-entity>
    <a-entity gltf-model="#perchero" position="0 0 0"></a-entity>
    <a-entity gltf-model="#plantas" position="0 0 0"></a-entity>

    <a-entity gltf-model="#mama" position="0 0 0" animation-mixer="clip: talk; loop: repeat; timeScale: 1"></a-entity>
    
    <a-video
      src="#stormVideo"
      position="-2.3 2.94 -3.1"
      width="3.5"
      height="2.3">
    </a-video>
    
    <a-video
      src="#tvVideo"
      position="-3.46 1.88 1.941"
      rotation="0 180 0"
      width="0.88"
      height="0.74">
    </a-video>

    <!-- Trigger boxes -->
    <a-box class="trigger" id="trigger1"  position="0 0 0"  width="1" height="2" depth="1" visible="true" data-audio="audio1"></a-box>
    <a-box class="trigger" id="trigger2"  position="-10 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio2"></a-box>
    <a-box class="trigger" id="trigger3"  position="-12 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio3"></a-box>
    <a-box class="trigger" id="trigger4"  position="-14 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio4"></a-box>
    <a-box class="trigger" id="trigger5"  position="-16 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio5"></a-box>
    <a-box class="trigger" id="trigger6"  position="-18 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio6"></a-box>
    <a-box class="trigger" id="trigger7"  position="-20 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio7"></a-box>
    <a-box class="trigger" id="trigger8"  position="-22 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio8"></a-box>
    <a-box class="trigger" id="trigger9"  position="-24 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio9"></a-box>
    <a-box class="trigger" id="trigger10" position="-26 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio10"></a-box>
    <a-box class="trigger" id="trigger11" position="-28 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio11"></a-box>
    <a-box class="trigger" id="trigger12" position="-30 1 0"  width="1" height="2" depth="1" visible="false" data-audio="audio12"></a-box>
    <a-box class="trigger" id="trigger13" position="-32 1 0" width="1" height="2" depth="1" visible="false" data-audio="audio13"></a-box>

    <!-- RIG -->
    <a-entity id="rig" position="0 0 0" aabb-collider="objects: .trigger">

      <a-entity id="player"
                gltf-model="#nino"
                animation-mixer="clip: walk; loop: repeat">
      </a-entity>
      
      <!-- CÁMARA -->
      <a-entity id="cameraPivot" position="0 1.5 0">
        <a-entity id="cameraYaw" look-controls="pointerLockEnabled: false">
          <a-entity id="cameraBoom" position="0 1 4">
            <a-entity id="gameCamera" camera></a-entity>
          </a-entity>
        </a-entity>
      </a-entity>

    </a-entity>

<!-- Luz 1 -->
<a-light
  type="point"
  color="#ff9d3d"
  intensity="1.2"
  distance="4"
  decay="2"
  position="2 2 0">
</a-light>

<!-- Luz 2 -->
<a-light
  type="point"
  color="#ffffff"
  intensity="2.5"
  distance="8"
  decay="2"
  position="-3.4 1.5 1">
</a-light>

<!-- Luz 3 -->
<a-light
  type="point"
  color="#ff9d3d"
  intensity="1.2"
  distance="8"
  decay="2"
  position="-6 2.2 0">
</a-light>
    
  </a-scene>

  <script>
    window.addEventListener('load', () => {
      const scene = document.querySelector('a-scene');

      scene.addEventListener('loaded', () => {

        const rig = document.querySelector('#rig');
        const player = document.querySelector('#player');
        const camera = document.querySelector('#gameCamera');
        const cameraYaw = document.querySelector('#cameraYaw');
        const navMeshEl = document.querySelector('#navmeshEntity');
        const salidaTrigger = document.querySelector('#salidaTrigger');

        const exitDistance = 1.5;
        let alreadyTriggered = false;

        if (!rig || !player || !camera || !navMeshEl) {
          console.warn('Faltan elementos rig/player/camera/navmesh');
          return;
        }

        const speed = 0.5;
        const rotationSmooth = 0.15;

        let keys = {};
        let nippleVector = new THREE.Vector2(0, 0);
        let lookInput = new THREE.Vector2(0, 0);
        let lastTime = performance.now();
        let moving = false;
        let started = false;

        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        function angleDifference(a, b) {
          let diff = b - a;
          return Math.atan2(Math.sin(diff), Math.cos(diff));
        }

        function snapRigToNavmesh() {
          if (!navMeshEl.object3D) return false;

          navMeshEl.object3D.updateMatrixWorld(true);

          const origin = rig.object3D.position.clone();
          origin.y += 5;

          raycaster.set(origin, downVector);

          const intersects = raycaster.intersectObject(navMeshEl.object3D, true);

          if (intersects.length > 0) {
            rig.object3D.position.y = intersects[0].point.y;
            return true;
          }

          return false;
        }

        /* TECLADO */
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        /* JOYSTICKS */
        const isTouch = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (isTouch) {
          const leftZone = document.getElementById('joyLeft');
          const rightZone = document.getElementById('joyRight');

          leftZone.style.display = 'block';
          rightZone.style.display = 'block';

          const moveJoy = nipplejs.create({
            zone: leftZone,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white',
            size: 120
          });

          moveJoy.on('move', (evt, data) => {
            if (!data || !data.vector) return;
            nippleVector.set(data.vector.x, data.vector.y);
          });

          moveJoy.on('end', () => nippleVector.set(0, 0));

          const lookJoy = nipplejs.create({
            zone: rightZone,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white',
            size: 120
          });

          lookJoy.on('move', (evt, data) => {
            if (!data || !data.vector) return;
            lookInput.set(data.vector.x, data.vector.y);
          });

          lookJoy.on('end', () => lookInput.set(0, 0));
        }

        /* ANIMACIÓN */
        player.addEventListener('model-loaded', () => {
          player.components['animation-mixer']?.pause();
        });

/* TRIGGERS AABB */

const activatedTriggers = new Set();

function getTriggerEntity(event) {
  const detail = event.detail || {};
  return detail.el || detail.intersectedEls?.[0] || detail.els?.[0] || null;
}

rig.addEventListener("hitstart", (event) => {

  const trigger = getTriggerEntity(event);

  if (!trigger) return;
  if (!trigger.classList.contains("trigger")) return;

  const triggerId = trigger.id || trigger.object3D.uuid;

  if (activatedTriggers.has(triggerId)) return;
  activatedTriggers.add(triggerId);

  const audioId = trigger.getAttribute("data-audio");
  if (!audioId) return;

  const audio = document.getElementById(audioId);
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();

});
        
        function tick() {
          const now = performance.now();
          const delta = (now - lastTime) / 1000;
          lastTime = now;

          navMeshEl.object3D.updateMatrixWorld(true);

          const input = new THREE.Vector2(0, 0);

          if (keys['w']) input.y -= 1;
          if (keys['s']) input.y += 1;
          if (keys['a']) input.x -= 1;
          if (keys['d']) input.x += 1;

          input.x += nippleVector.x;
          input.y -= nippleVector.y;

          if (input.length() > 0) {
            input.normalize();

            const forward = new THREE.Vector3();
            camera.object3D.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            const moveVector = new THREE.Vector3();
            moveVector.addScaledVector(forward, input.y);
            moveVector.addScaledVector(right, -input.x);

            const subSteps = 8;
            const cornerFriction = 0.5;

            const totalMove = moveVector.clone().multiplyScalar(speed * delta);
            const stepMove = totalMove.clone().divideScalar(subSteps);

            let currentPosition = rig.object3D.position.clone();

            for (let i = 0; i < subSteps; i++) {
              let moved = false;

              let testFull = currentPosition.clone().add(stepMove);
              let origin = testFull.clone();
              origin.y += 5;

              raycaster.set(origin, downVector);
              let intersects = raycaster.intersectObject(navMeshEl.object3D, true);

              if (intersects.length > 0) {
                currentPosition.copy(testFull);
                currentPosition.y = intersects[0].point.y;
                moved = true;
              }

              if (!moved) {
                const tryAxis = (axis, amount) => {
                  let reduced = amount;

                  for (let r = 0; r < 3; r++) {
                    let test = currentPosition.clone();
                    test[axis] += reduced;

                    let o = test.clone();
                    o.y += 5;

                    raycaster.set(o, downVector);
                    let hits = raycaster.intersectObject(navMeshEl.object3D, true);

                    if (hits.length > 0) {
                      currentPosition[axis] = test[axis];
                      currentPosition.y = hits[0].point.y;
                      return true;
                    }

                    reduced *= cornerFriction;
                  }
                  return false;
                };

                tryAxis("x", stepMove.x);
                tryAxis("z", stepMove.z);
              }
            }

            rig.object3D.position.copy(currentPosition);

            const moveAngle = Math.atan2(moveVector.x, moveVector.z);
            const targetRotation = moveAngle + Math.PI;
            const currentRotation = player.object3D.rotation.y;
            const diff = angleDifference(currentRotation, targetRotation);
            player.object3D.rotation.y += diff * rotationSmooth;

            if (!moving) {
              player.components['animation-mixer']?.play();
              moving = true;
            }
          } else {
            if (moving) {
              player.components['animation-mixer']?.pause();
              moving = false;
            }
          }

          /* Ajuste altura navmesh */
          snapRigToNavmesh();

          /* ROTACIÓN CÁMARA */
          const look = cameraYaw.components['look-controls'];
          if (look) {
            const rotSpeed = 1.5;

            look.yawObject.rotation.y -= lookInput.x * rotSpeed * delta;
            look.pitchObject.rotation.x -= lookInput.y * rotSpeed * delta;

            const maxPitch = Math.PI / 2 - 0.1;
            look.pitchObject.rotation.x = Math.max(
              -maxPitch,
              Math.min(maxPitch, look.pitchObject.rotation.x)
            );
          }

          /* ===== DETECCIÓN DE SALIDA CON TRIGGER ===== */
          if (salidaTrigger && !alreadyTriggered) {
            const playerPos = rig.object3D.position.clone();
            const triggerPos = new THREE.Vector3();
            salidaTrigger.object3D.getWorldPosition(triggerPos);

            const distance = playerPos.distanceTo(triggerPos);

            if (distance < exitDistance) {
              alreadyTriggered = true;
              console.log("Salida activada");

              setTimeout(() => {
                window.location.href = "https://youtu.be/8Xo1rKX7Les?si=jWto45dyINOwZaBx";
              }, 300);
            }
          }

          requestAnimationFrame(tick);
        }

        navMeshEl.addEventListener('model-loaded', () => {
          console.log('Navmesh cargado');

          if (!started) {
            started = true;
            snapRigToNavmesh();
            tick();
          }
        });

      });
    });
      
    window.addEventListener('click', () => {
      document.querySelectorAll('video').forEach(video => {
        video.play();
      });
    }, { once: true });
    
  </script>

</body>
</html>
